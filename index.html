<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BS 7909 – G1 Completion Certificate</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0b0c10;
      color: #e9eef3;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #11131a;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 0.9rem;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0e1017;
      color: #e9eef3;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>BS 7909 – G1 Completion Certificate</h1>

      <form id="g1-form">

        <label>Event</label>
        <select id="eventSelect" name="event" required></select>

        <label>Location / Venue</label>
        <select id="venueSelect" name="venue" required></select>

        <button class="btn" type="submit">
          Submit G1 Certificate
        </button>

      </form>
    </div>
  </div>

<script>
  // ==============================
  // 🔧 CONFIG – YOU MUST EDIT THESE
  // ==============================

  const WEBHOOK_URL = "https://YOUR_WEBHOOK_URL_HERE";

  const EVENT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQmDL4HW2xKjVw7qzaJwzYPXiF-S7kFPYctaCWbbg2xWqx6e-dIdK3CeVwkTwENviL2xsNdPD583nL/pub?gid=0&single=true&output=csv”;
  const VENUE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQmDL4HW2xKjVw7qzaJwzYPXiF-S7kFPYctaCWbbg2xWqx6e-dIdK3CeVwkTwENviL2xsNdPD583nL/pub?gid=1350118990&single=true&output=csv”

  // ==============================
  // 📥 LOAD CSV DATA
  // ==============================

  async function loadCSV(url){
  const res = await fetch(url);
  const text = await res.text();
  return text
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean)
    .slice(1); // removes header row
}


  // ==============================
  // 📋 POPULATE DROPDOWNS
  // ==============================

  function populateSelect(selectId, options) {
    const select = document.getElementById(selectId);

    select.innerHTML = '<option value="">Select...</option>';

    options.forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
  }


  // ==============================
  // 🚀 INIT
  // ==============================

  async function init() {
    try {
      const events = await loadCSV(EVENT_CSV_URL);
      populateSelect("eventSelect", events);

      const venues = await loadCSV(VENUE_CSV_URL);
      populateSelect("venueSelect", venues);

    } catch (err) {
      console.error("Failed to load CSV lists:", err);
      alert("Failed to load dropdown lists. Check your CSV links.");
    }
  }


  // ==============================
  // 📦 FORM → JSON
  // ==============================

  function formToJSON(form) {
    const data = new FormData(form);
    const obj = {};

    for (const [key, value] of data.entries()) {
      obj[key] = value;
    }

    obj._meta = {
      submitted_at: new Date().toISOString()
    };

    return obj;
  }


  // ==============================
  // 📤 SUBMIT TO MAKE
  // ==============================

  document.getElementById("g1-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = e.currentTarget;
    const payload = formToJSON(form);

    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      alert("Submitted successfully!");
      form.reset();

    } catch (err) {
      console.error(err);
      alert("Submission failed");
    }
  });


  // Run on load
  init();

</script>
</body>
</html>
